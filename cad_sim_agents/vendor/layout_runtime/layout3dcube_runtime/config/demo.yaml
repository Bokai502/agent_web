# 卫星舱三维布局示例配置

# 舱体包络
envelope:
  auto_envelope: true          # 根据占空比自动计算尺寸
  size_mm: [2000, 1500, 1000]  # 若auto_envelope为false时使用
  origin: center               # center: 以原点为中心; corner: 以原点为一角
  fill_ratio: 0.30          # 占空比（内部体积/外壳体积）
  size_ratio: [1.7, 1.8, 1.5]  # 自动尺寸比例 x:y:z
  shell_thickness_mm: 5.0      # 壁厚（mm），0表示片体

# 禁区列表（Keep-out zones）
keep_out:
  # - min_mm: [500, 200, 200]
  #   max_mm: [500, 200, 200]
  #   tag: "sensor_fov"           # 传感器视场

  # - min_mm: [-400, -300, -200]
  #   max_mm: [-200, 300, 200]
  #   tag: "antenna_clearance"    # 天线净空

# BOM 合成参数
synth:
  n_parts: 20                   # 设备数量
  dims_min_mm: [50, 50, 50]     # 最小尺寸 [x, y, z]
  dims_max_mm: [180, 200, 150]  # 最大尺寸 [x, y, z]
  mass_range_kg: [0.5, 5.0]     # 质量范围 [min, max] kg
  power_range_W: [1, 50]        # 功率范围 [min, max] W
  categories:                   # 设备类别
    - payload
    - avionics
    - power
  seed: 42                      # 随机种子（可复现）

# 装箱参数
clearance_mm: 20                 # 设备间隙（mm）
multistart: 10                  # 多启动次数（增加可提高装箱率）
