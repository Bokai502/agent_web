name: translate_all
description: |
  整体平移 STEP 中所有实体指定偏移量 (dx, dy, dz)。
  适用指令示例: "将整体沿 X 方向平移 10mm", "整体偏移 (5, 0, 3) mm"
keywords:
  - 平移
  - 整体偏移
  - translate
  - shift
  - 移动所有
parameters:
  dx:
    type: float
    description: X 方向偏移 (mm)
    default: 0.0
  dy:
    type: float
    description: Y 方向偏移 (mm)
    default: 0.0
  dz:
    type: float
    description: Z 方向偏移 (mm)
    default: 0.0
# Python 代码片段; {dx},{dy},{dz} 使用 .format() 填充
code: |
    dx, dy, dz = {dx}, {dy}, {dz}
    print("OPERATION: translate_all dx={{}} dy={{}} dz={{}}".format(dx, dy, dz))
    for obj in list(doc.Objects):
        if not hasattr(obj, "Placement"):
            continue
        p = obj.Placement
        p.Base = FreeCAD.Vector(p.Base.x + dx, p.Base.y + dy, p.Base.z + dz)
        obj.Placement = p
